name: Test

on: [push, pull_request]

permissions:
  contents: read
  pull-requests: write

jobs:
  windows:
    name: test windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'

      - name: Check formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run go vet
        shell: bash
        run: go vet ./...

      - name: Run staticcheck
        shell: bash
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Run Test Coverage
        shell: bash
        run: go test -v -coverprofile=coverage.txt ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-windows
          path: coverage.txt

      # - name: Post Coverage to PR
      #   if: github.event_name == 'pull_request'
      #   uses: fgrosse/go-coverage-report@v1.3.0
      #   with:
      #     coverage-artifact-name: code-coverage-windows
      #     coverage-file-name: coverage.txt

  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend:
          - name: sysfs
            tags: ''
          - name: libudev
            tags: 'udev'
          - name: sd-device
            tags: 'sd_device'
    name: test linux (${{ matrix.backend.name }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'

      - name: Install cgo dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libsystemd-dev

      - name: Run go vet
        run: go vet -tags '${{ matrix.backend.tags }}' ./...

      - name: Run staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck -tags '${{ matrix.backend.tags }}' ./...

      - name: Run Test Coverage
        env:
          CGO_ENABLED: '1'
        run: go test -v -tags '${{ matrix.backend.tags }}' -coverprofile=coverage.txt ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-linux-${{ matrix.backend.name }}
          path: coverage.txt